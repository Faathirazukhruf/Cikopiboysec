version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: cikopiboysec_password
      POSTGRES_DB: cikopiboysec_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - cikopiboysec_pgdata:/var/lib/postgresql/data

volumes:
  cikopiboysec_pgdata:
